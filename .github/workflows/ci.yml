name: CI — Build, Test & Publish

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write   # needed to commit generated README.md
  pages: write      # needed to deploy GitHub Pages
  id-token: write

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/

  # ── 2. Generate README + GitHub Pages ───────────────────────────────────
  generate-and-deploy:
    name: Generate README & Deploy Pages
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'   # only on push, not PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate README.md
        run: python scripts/generate_readme.py

      - name: Generate docs/index.html (GitHub Pages)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_pages.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.html
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: auto-update README and GitHub Pages [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
